<div id="namePosition">
  <h1 id="name">{{ this.fullName }}</h1>
  <span id="position">{{ this.jobTitle }}</span>
</div>
<div id="details">
  <div>
    <span>{{ this.location }}</span>
    <i data-feather="map-pin" aria-hidden="true"></i>
  </div>
  <div>
    <span>{{ this.phone }}</span>
    <i data-feather="phone" aria-hidden="true"></i>
  </div>
  <div>
    <span>{{ this.email }}</span>
    <i data-feather="mail" aria-hidden="true"></i>
  </div>
  <div>
    <span>{{ this.github }}</span>
    <i data-feather="github" aria-hidden="true"></i>
  </div>
</div>
